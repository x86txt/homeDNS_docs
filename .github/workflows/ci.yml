name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run build

      - name: Check output
        run: |
          test -f dist/index.html || (echo "dist/index.html missing" && exit 1)
          echo "Build output OK — $(find dist -name '*.html' | wc -l | tr -d ' ') HTML pages"
